name: Build, Scan and SBOM

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build-scan-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build and Generate Evidence
        run: make full-evidence

      - name: Upload Evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence-${{ github.sha }}
          path: .evidence/
          retention-days: 30