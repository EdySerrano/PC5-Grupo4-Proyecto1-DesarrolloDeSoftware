name: Deploy Local

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy-and-verify:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Build Docker Image
        run: docker build -t myapp:latest .

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/notes-app --timeout=60s

      - name: Verify Deployment
        run: |
          kubectl port-forward service/notes-service 30080:80 &
          PID=$!
          sleep 5
          echo "Ejecutando verificación de salud"
          python scripts/verify_deploy.py http://localhost:30080/health
          kill $PID